{% extends "auctions/layout.html" %}

{% block body %}
    <form action="{% url 'fil' %}" method="post">
        {% csrf_token %}
        <h6>Filter:</h6>
        <label for="category">Category</label>
            <select name="category" id="category">
                    {% for value, label in categories %}
                        <option value="{{ value }}">{{ label }}</option>
                    {% endfor %}
            </select>
        <label for="theme">Theme</label>
            <select name="theme" id="theme">
                    {% for value, label in themes %}
                        <option value="{{ value }}">{{ label }}</option>
                    {% endfor %}
            </select>
        <button type="submit" class="btn btn-primary btn-sm">Filter</button>
        {% if on %}
            <a href="{% url 'index' %}" class="btn btn-secondary btn-sm">Quit Filter</a>
        {% endif %}
    </form>
    <hr style="background-color: gray;">
    <h1>Active Listings:</h1>
    <div class="row mx-3" style="margin-right: 10px;">
        {% for listing in listings %}
        <a href="{% url 'listing_view' id=listing.id%}">
            <div class="card mb-3" style="min-width: 200px; max-width: 540px; margin-right: 20px; background-color: rgb(40, 40, 40);">
                <div class="row g-0">
                    <div class="col-md-4 d-flex justify-content-center" style="max-width: 100%; background-color: white; align-items: center;">
                        <img src="{{ listing.img_url }}" style="max-width: 100%;" class="img-fluid rounded-start" alt="wtf did you do Jim where is the fuking image?">
                    </div>
                    <div class="col-md-8">
                        <div class="card-body">
                            <h5 class="card-title">{{ listing.name }} ${{ listing.min_bid }}</h5>
                            <p class="card-text">{{ listing.description|truncatechars:75 }}</p>
                            <p class="card-text"><small class="text-body-secondary">{{ listing.date }}</small></p>  
                        </div>
                    </div>
                </div>
            </div>
        </a>
        {% endfor %}
    </div>
{% endblock %}
