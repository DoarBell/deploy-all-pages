{% extends "auctions/layout.html" %}

{% block body %}
    <h2>Create new listing</h2>

    <form action="{% url 'cr_listing' %}" method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="name">Title</label>
            <input type="text" name="title" class="form-control" id="title" placeholder="Enter title">
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <input type="text" name="description" class="form-control" id="description" placeholder="Enter description">
        </div>
        <div class="form-group">
            <label for="Image_url">Image url</label>
            <input type="url" name="image_url" class="form-control" id="imageurl" placeholder="Enter image url">
        </div>
        <div class="form-group">
            <label for="price">Price</label>
            <input type="number" name="price" class="form-control" id="price" placeholder="Enter price">
        </div>
        <div class="form-group">
            <label for="category">Category</label>
            <select name="category" id="category">
                    {% for value, label in scattergories %}
                        <option value="{{ value }}">{{ label }}</option>
                    {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="theme">Theme</label>
            <select name="theme" id="theme">
                {% for value, label in themenopark %}
                    {% if value != "any" %}
                        <option value="{{ value }}">{{ label }}</option>
                    {% endif %}
                {% endfor %}
            </select>
        </div>
    
        <button type="submit" class="btn btn-warning">Create new listing</button>
    </form>
{% endblock %}
