{% extends "auctions/layout.html" %}

{% block body %}
<h1>Owned Listings:</h1>
    {% for listing in listings %}
        <div class="card mb-3" style="min-width: 200px; max-width: 540px; margin-right: 20px; background-color: rgb(40, 40, 40);">
            <div class="row g-0">
                <div class="col-md-4 d-flex justify-content-center" style="max-width: 100%; background-color: white; align-items: center;">
                    <img src="{{ listing.img_url }}" style="max-width: 100%;" class="img-fluid rounded-start" alt="wtf did you do Jim where is the fuking image?">
                </div>
                <div class="col-md-8">
                    <div class="card-body">
                        <h5 class="card-title">{{ listing.name }} paid: ${{ listing.min_bid }}</h5>
                        <p class="card-text">{{ listing.description|truncatechars:75 }}</p>
                        <p class="card-text"><small class="text-body-secondary">{{ listing.date }}</small></p>  
                    </div>
                </div>
            </div>
        </div>

        {% endfor %}
{% endblock %}
